name: Publish Docker image

on:
  push:
    branches: [master]
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r backend/requirements-dev.txt

      - name: Run tests
        run: python -m pytest backend/tests/ -v

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Build amd64 image for smoke test
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          platforms: linux/amd64
          tags: pmse-to-wwb:smoketest

      - name: Smoke test container (runs as non-root -- verifies it actually starts, not just builds)
        run: |
          docker run -d --name smoketest -p 8420:8000 pmse-to-wwb:smoketest
          ok=false
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8420/health > /dev/null; then
              ok=true
              break
            fi
            sleep 2
          done
          docker logs smoketest
          docker rm -f smoketest
          if [ "$ok" != "true" ]; then
            echo "Container did not become healthy"
            exit 1
          fi

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/pmse-to-wwb:latest
            ghcr.io/${{ github.repository_owner }}/pmse-to-wwb:${{ github.sha }}
